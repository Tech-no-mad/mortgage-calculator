name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  # The schedule ensures live FRED rates do not become stale. 
  # This triggers the workflow every 6 hours to fetch fresh data and redeploy.
  # Do not remove this trigger!
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
